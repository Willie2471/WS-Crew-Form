<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hedge Trim Request – WS Lawn Care</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      background: #f4f7f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #dde8dd;
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 {
      font-size: 26px;
      color: #2e7d32;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #444;
      line-height: 1.7;
      margin-bottom: 10px;
    }
    .divider {
      border: none;
      border-top: 2px solid #2e7d32;
      margin: 24px 0;
    }
    .redirect-note {
      font-size: 13px;
      color: #888;
      font-style: italic;
    }
    .bar {
      height: 6px;
      background: #e8f5e9;
      border-radius: 4px;
      overflow: hidden;
      margin: 16px 0 8px;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: #2e7d32;
      border-radius: 4px;
      transition: width 4s linear;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">✂️</div>
  <h1>Request Received!</h1>
  <p>Thank you — your hedge & shrub trimming request has been sent to the WS Lawn Care team.</p>
  <p>We'll be in touch shortly to schedule and confirm pricing.</p>
  <hr class="divider"/>
  <p class="redirect-note">Taking you to our Hedge & Shrub Trimming page in a few seconds…</p>
  <div class="bar"><div class="bar-fill" id="bar"></div></div>
  <p style="font-size:12px;color:#aaa;">WS Lawn Care Services, LLC &nbsp;|&nbsp; "You Grow It, We Mow It!"</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name    = params.get('name')    || 'Unknown Customer';
  const address = params.get('address') || 'Not provided';
  const email   = params.get('email')   || 'Not provided';
  const service = 'Hedge & Shrub Trimming';
  const redirectUrl = 'https://www.wslawncareservicesllc.com/addhedgesshrubs';

  // Fire alert email via Zapier webhook
  fetch('https://hooks.zapier.com/hooks/catch/20549459/2upsell1/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    mode: 'no-cors',
    body: JSON.stringify({ name, address, email, service })
  });

  setTimeout(() => { document.getElementById('bar').style.width = '100%'; }, 100);
  setTimeout(() => { window.location.href = redirectUrl; }, 4500);
</script>
</body>
</html>
